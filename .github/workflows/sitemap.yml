name: Generate Sitemap
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate sitemap
        run: |
          ARTICLES=$(curl -s \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            "https://jztxnznkjevzngvrlp.supabase.co/rest/v1/articles?select=title,created_at&order=created_at.desc")
          node -e "
          const articles = JSON.parse(process.env.ARTICLES);
          const urls = articles.map(a => {
            const slug = encodeURIComponent(a.title.toLowerCase().replace(/\s+/g,'-'));
            return '<url><loc>https://foundtribesofisrael.com/?article='+slug+'</loc><lastmod>'+a.created_at.split('T')[0]+'</lastmod></url>';
          }).join('');
          const xml = '<?xml version=\"1.0\" encoding=\"UTF-8\"?><urlset xmlns=\"http://www.sitemaps.org/schemas/sitemap/0.9\"><url><loc>https://foundtribesofisrael.com/</loc></url>'+urls+'</urlset>';
          require('fs').writeFileSync('public/sitemap.xml', xml);
          console.log('Done: '+articles.length+' articles');
          "
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ARTICLES: $(echo $ARTICLES)
      - name: Commit sitemap
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/sitemap.xml
          git diff --staged --quiet || git commit -m "Update sitemap"
          git push
