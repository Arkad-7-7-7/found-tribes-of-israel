        /* ПАНЕЛЬ ПЕРЕКЛАДУ (70+ МОВ) */
        .translate-bar { 
            background: var(--deep); 
            border-bottom: 1px solid rgba(201,168,76,0.2); 
            padding: 10px 24px; 
            display: flex; 
            align-items: center; 
            justify-content: flex-end; 
            gap: 12px; 
            position: sticky; 
            top: 0; 
            z-index: 500; 
        }
        
        #language-select { 
            background: rgba(201,168,76,0.1); 
            border: 1px solid var(--gold-dark); 
            color: var(--parchment); 
            padding: 6px 12px; 
            border-radius: 4px; 
            font-family: 'EB Garamond', serif;
            cursor: pointer; 
            outline: none;
        }

        /* НАВІГАЦІЯ */
        nav.main-nav { 
            position: sticky; 
            top: 45px; 
            z-index: 400; 
            background: rgba(13, 10, 5, 0.95); 
            border-bottom: 2px solid var(--gold-dark); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 32px; 
            height: 65px; 
            backdrop-filter: blur(5px);
        }
        .nav-logo { font-family: 'Cinzel', serif; font-size: 1.1rem; font-weight: 800; color: var(--gold); text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .nav-links { display: flex; list-style: none; }
        .nav-links a { font-family: 'Cinzel', serif; font-size: 0.75rem; color: rgba(245,237,214,0.7); text-decoration: none; padding: 20px 16px; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover { color: var(--gold-light); }

        /* ГЕРОЙ-СЕКЦІЯ */
        .hero { min-height: 60vh; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 60px 20px; }
        .hero-hebrew { font-family: 'Noto Sans Hebrew', serif; font-size: clamp(2rem, 5vw, 3.5rem); color: var(--gold); margin-bottom: 15px; letter-spacing: 5px; }
        .hero h1 { font-family: 'Cinzel', serif; font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 800; line-height: 1.1; margin-bottom: 20px; text-transform: uppercase; }
        .hero h1 span { color: var(--gold); }
        .gold-rule { width: 120px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 20px auto; }

        /* ЄДИНИЙ ХУДОЖНІЙ СУВІЙ */
        .scroll-container {
            background: var(--parchment);
            color: var(--ink);
            padding: 40px;
            margin: 40px auto;
            max-width: 900px;
            position: relative;
            box-shadow: 0 30px 70px rgba(0,0,0,0.9);
            border-left: 18px solid #b89564;
            border-right: 18px solid #b89564;
            border-radius: 4px;
        }

        .celtic-border {
            border: 4px double var(--gold-dark);
            padding: 35px;
            position: relative;
            min-height: 400px;
        }

        .menorah-bg {
            position: absolute;
            bottom: 25px;
            right: 30px;
            font-size: 7rem;
            opacity: 0.04;
            pointer-events: none;
            color: var(--gold-dark);
        }

        /* Список статтей (Манускрипт) */
        .article-row {
            padding: 25px 0;
            border-bottom: 1px dashed rgba(138, 107, 42, 0.4);
            text-align: left;
            transition: 0.4s ease;
        }
        .article-row:hover { transform: translateX(8px); }
        .flower-icon { color: var(--petrykivka); font-size: 1.4rem; margin-right: 12px; }

        /* Анімація появи */
        .reveal { opacity: 0; transform: translateY(30px); transition: 1s ease-out; }
        .reveal.visible { opacity: 1; transform: translateY(0); }

        footer { padding: 60px; text-align: center; border-top: 1px solid rgba(201,168,76,0.2); background: var(--deep); }

        /* Приховати панель Google */

        body { top: 0 !important; }
        .skiptranslate { display: none !important; }
    </style>
</head>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    // ВСТАВ СВОЇ ДАНІ SUPABASE ТУТ
    const SUPABASE_URL = 'https://jztxnznkjevzngvrlp.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6dHhuem5ramV2em5ndnJscHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNTQ0NTgsImV4cCI6MjA4NzYzMDQ1OH0.X9gS4qAfLJ8CO2mF0OXaGgierBtxdszUJZn_r7224oE';

    async function loadArticles() {
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        const { data, error } = await supabase.from('articles').select('*').order('id', { ascending: false });
        const list = document.getElementById('articlesList');

        if (error || !data || data.length === 0) {
            list.innerHTML = "<div style='text-align:center; padding:40px;'>Архіви тимчасово недоступні. Перевірте з'єднання.</div>";
            return;
        }

        list.innerHTML = data.map(a => `
            <div class='article-row reveal'>
                <div style="display: flex; align-items: baseline;">
                    <span class="flower-icon">✿</span>
                    <h3 style="font-family: 'Cinzel', serif; font-size: 1.25rem; margin: 0; color: #1a1208; letter-spacing: 0.5px;">${a.title}</h3>
                </div>
                <p style="color: #333; margin: 12px 0 0 35px; font-size: 1.15rem; line-height: 1.7; font-family: 'EB Garamond', serif;">
                    ${(a.content||'').substring(0, 200)}...
                </p>
                <div style="text-align: right; margin-top: 15px;">
                    <span style="font-family: 'Cinzel'; font-size: 0.75rem; color: #8a6b2a; font-weight: 800; cursor: pointer; letter-spacing: 1.5px; border-bottom: 1px solid var(--gold);">ВІДКРИТИ →</span>
                </div>
            </div>
        `).join('');

        // Ініціалізація анімації для нових елементів
        const obs = new IntersectionObserver((entries) => {
            entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
    }

    loadArticles();

    // Функція перекладу
    window.translateTo = function(lang) {
        if (!lang) {
            document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/";
            location.reload();
            return;
        }
        document.cookie = "googtrans=/uk/" + lang + "; path=/";
        location.reload();
    }
</script>
