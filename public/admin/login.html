<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Адмін - Found Tribes</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:linear-gradient(135deg,#1a1a2e,#16213e);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.box{background:white;padding:40px;border-radius:16px;width:320px;}
h2{text-align:center;color:#2c3e50;margin-bottom:24px;}
input{width:100%;padding:12px;border:2px solid #dee2e6;border-radius:8px;font-size:1em;margin-bottom:16px;}
button{width:100%;padding:12px;background:#2c3e50;color:white;border:none;border-radius:8px;font-size:1em;cursor:pointer;}
#error{color:red;text-align:center;margin-top:12px;}
</style>
</head>
<body>
<div class="box">
<h2>🔍 Адмін панель</h2>
<input type="password" id="password" placeholder="Введіть пароль">
<button onclick="login()">Увійти</button>
<div id="error"></div>
</div>
<script>
function login(){
  const p = document.getElementById("password").value;
  if(p === "Israel"){
    localStorage.setItem("admin","yes");
    window.location.href="/admin/editor.html";
  } else {
    document.getElementById("error").textContent="Невірний пароль";
  }
}
</script>
</body>
</html>
