<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Редактор статей</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#f5f5f5;padding:20px;}
.container{max-width:800px;margin:0 auto;background:white;padding:30px;border-radius:12px;}
h1{color:#2c3e50;margin-bottom:20px;}
input,textarea{width:100%;padding:12px;border:2px solid #dee2e6;border-radius:8px;font-size:1em;margin-bottom:16px;}
textarea{height:300px;resize:vertical;}
button{padding:12px 24px;background:#2c3e50;color:white;border:none;border-radius:8px;font-size:1em;cursor:pointer;}
#message{margin-top:16px;color:green;}
</style>
</head>
<body>
<div class="container">
<h1>✍️ Нова стаття</h1>
<input type="text" id="title" placeholder="Заголовок статті">
<textarea id="content" placeholder="Текст статті..."></textarea>
<button onclick="save()">Зберегти статтю</button>
<div id="message"></div>
</div>

<script type="module">
const SUPABASE_URL = "https://jztxnznkjevzngvrlp.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6dHhuem5ramV2em5ndnJscHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNTQ0NTgsImV4cCI6MjA4NzYzMDQ1OH0.X9gS4qAfLJ8CO2mF0OXaGgierBtxdszUJZn_r7224oE";
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

// Перевірка адміна
if(!localStorage.getItem("admin")){
  window.location.href="/admin/login.html";
}

async function save() {
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;
  const message = document.getElementById("message");

  if (!title || !content) {
    message.style.color = "red";
    message.textContent = "Заповніть всі поля";
    return;
  }

  const { data, error } = await supabase
    .from("articles")
    .insert([{ title, content }]);

  if (error) {
    message.style.color = "red";
    message.textContent = "Помилка збереження: " + error.message;
    console.log(error);
  } else {
    message.style.color = "green";
    message.textContent = "Стаття збережена!";
    document.getElementById("title").value = "";
    document.getElementById("content").value = "";
  }
}
</script>
</body>
</html>
