<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Found Tribes of Israel | Лінгвістичне Дослідження</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Sans+Hebrew:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* — Весь твій CSS тут (як у попередньому коді) — */
</style>
</head>
<body>

<!-- Модалка для статті -->
<div id="articleModal" class="modal" onclick="if(event.target===this)closeArticle()">
    <div class="modal-box">
        <span class="modal-close" onclick="closeArticle()">✕ ЗАКРИТИ</span>
        <h2 class="modal-title" id="modalTitle"></h2>
        <div id="modalBody"></div>
    </div>
</div>

<!-- Мова -->
<div class="lang-bar">
    <span class="lang-bar-label">🌐 Мова / Language</span>
    <div class="lang-select-wrapper">
        <select id="language-select" onchange="translateTo(this.value)">
            <option value="">🇺🇦 Українська</option>
            <!-- Інші опції як у твоєму коді -->
        </select>
    </div>
</div>

<!-- Навігація -->
<nav class="main-nav" id="mainNav">
    <a href="#" class="nav-logo"><span class="nav-logo-heb">שְׁבָטִים</span>Found Tribes</a>
    <ul class="nav-links">
        <li><a href="#about">Дослідження</a></li>
        <li><a href="#stats">Статистика</a></li>
        <li><a href="#articles">Реєстр</a></li>
        <li><a href="#contact">Контакти</a></li>
    </ul>
    <div class="burger" onclick="toggleMenu()" id="burger">
        <span></span><span></span><span></span>
    </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
    <a href="#about" onclick="closeMobile()">Дослідження</a>
    <a href="#stats" onclick="closeMobile()">Статистика</a>
    <a href="#articles" onclick="closeMobile()">Реєстр статей</a>
    <a href="#contact" onclick="closeMobile()">Контакти</a>
</div>

<!-- Hero, Статистика, Статті, Контакти та Footer — вставити твої секції тут -->

<div id="google_translate_element" style="display:none"></div>
<script>
function googleTranslateElementInit(){
    new google.translate.TranslateElement({pageLanguage:'uk',autoDisplay:false},'google_translate_element');
}
</script>
<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<script>
const SUPABASE_URL = 'https://jztxnznkjevzngvrlpzh.supabase.co';
const SUPABASE_KEY = 'ТВОЙ_СЕКРЕТ_КЛЮЧ'; // <- вставляєш сюди свій ключ

// Завантаження статей
async function loadArticles(){
    const list = document.getElementById('articlesList');
    try{
        const r = await fetch(`${SUPABASE_URL}/rest/v1/articles?select=*&order=id.desc`,{
            headers: {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer '+SUPABASE_KEY}
        });
        const data = await r.json();
        if(!data || data.length === 0){
            list.innerHTML = '<div class="empty-state"><div class="empty-text">Архіви порожні</div></div>';
            return;
        }
        list.innerHTML = data.map(a => `
            <div class="article-row" data-title="${a.title}" data-content="${encodeURIComponent(a.content||'')}">
                <div class="article-title-row"><span class="flower-icon">✿</span><h3 class="article-title">${a.title}</h3></div>
                <p class="article-preview">${(a.content||'').substring(0,220)}...</p>
                <div class="article-footer">
                    <span class="article-date">${a.created_at?new Date(a.created_at).toLocaleDateString('uk-UA'):''}</span>
                    <span class="read-more-btn" onclick="openArticle(this)">ЧИТАТИ ПОВНІСТЮ →</span>
                </div>
            </div>
        `).join('');
        initReveal();
    }catch(e){
        list.innerHTML = '<div class="empty-state"><div class="empty-text">Помилка з\'єднання</div></div>';
    }
}

// Модалка
function openArticle(btn){
    const row = btn.closest('.article-row');
    document.getElementById('modalTitle').innerText = row.dataset.title;
    document.getElementById('modalBody').innerHTML = decodeURIComponent(row.dataset.content).replace(/\n/g,'<br>');
    document.getElementById('articleModal').style.display = 'block';
    document.body.style.overflow = 'hidden';
}
function closeArticle(){
    document.getElementById('articleModal').style.display = 'none';
    document.body.style.overflow = 'auto';
}

// Reveal-анімації
function initReveal(){
    const obs = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            if(entry.isIntersecting){
                entry.target.classList.add('visible');
                obs.unobserve(entry.target);
            }
        });
    }, {threshold:0.08});
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
}

// Мобільне меню
function toggleMenu(){ document.getElementById('mobileMenu').classList.toggle('open'); }
function closeMobile(){ document.getElementById('mobileMenu').classList.remove('open'); }

// Google Translate
window.translateTo = function(lang){
    if(!lang){
        document.cookie = "googtrans=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/";
        location.reload();
        return;
    }
    document.cookie = "googtrans=/uk/"+lang+";path=/";
    document.cookie = "googtrans=/uk/"+lang+";path=/;domain="+location.hostname;
    location.reload();
}

// Ініціалізація
initReveal();
loadArticles();
</script>

</body>
</html>
