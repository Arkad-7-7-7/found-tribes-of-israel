<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Демо Завитки</title>
<style>
:root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --deep: #17120b;
    --parchment: #fdf5e6;
}
body {
    background: var(--deep);
    color: var(--parchment);
    font-family: 'EB Garamond', serif;
    height: 100vh;
    margin:0;
    overflow: hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    position: relative;
}
.hero {
    text-align: center;
    position: relative;
}
.hero h1 {
    font-size: 3rem;
    color: var(--gold);
    margin-bottom: 1rem;
}
.hero p {
    font-size: 1.2rem;
    color: var(--parchment);
}

/* Завитки */
.hero-decor {
    position: absolute;
    top: -20px;
    left: -20px;
    pointer-events: none;
    animation: swirl 6s ease-in-out infinite alternate;
}
.hero-decor svg path {
    stroke: var(--gold-light);
    stroke-width: 2;
    fill: transparent;
    stroke-linecap: round;
}
@keyframes swirl {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(15deg) scale(1.1); }
    100% { transform: rotate(0deg) scale(1); }
}
</style>
</head>
<body>
<div class="hero">
    <h1>Found Tribes</h1>
    <p>Демо декоративних завитків у hero</p>
    <div class="hero-decor">
        <svg width="100" height="100" viewBox="0 0 100 100">
            <path d="M10,50 C30,10 70,90 90,50" />
            <path d="M15,60 C35,20 65,80 85,60" />
        </svg>
    </div>
</div>
</body>
</html>
