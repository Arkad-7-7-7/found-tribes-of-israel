<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Found Tribes of Israel | Лінгвістичне Дослідження</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Sans+Hebrew:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root{--gold:#c9a84c;--gold-light:#e8c97a;--gold-dark:#8a6b2a;--ink:#1a1208;--parchment:#fdf5e6;--deep:#0d0a05;--petrykivka:#b02020;}
        *{margin:0;padding:0;box-sizing:border-box;}
        html{scroll-behavior:smooth;}
        body{background:var(--deep);color:var(--parchment);font-family:'EB Garamond',Georgia,serif;overflow-x:hidden;}
        .lang-bar{background:var(--deep);border-bottom:1px solid rgba(201,168,76,0.25);padding:8px 24px;display:flex;align-items:center;justify-content:flex-end;gap:14px;position:sticky;top:0;z-index:600;}
        .lang-bar-label{font-family:'Cinzel',serif;font-size:0.65rem;color:var(--gold-dark);letter-spacing:3px;}
        .lang-select-wrapper{position:relative;}
        .lang-select-wrapper::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--gold);pointer-events:none;}
        #language-select{background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.35);color:var(--parchment);padding:6px 32px 6px 12px;border-radius:3px;font-family:'EB Garamond',serif;font-size:0.9rem;cursor:pointer;outline:none;appearance:none;min-width:185px;}
        #language-select option{background:#1a1208;}
        nav.main-nav{position:sticky;top:41px;z-index:500;background:rgba(13,10,5,0.97);border-bottom:1px solid rgba(201,168,76,0.3);display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:64px;backdrop-filter:blur(10px);}
        .nav-logo{font-family:'Cinzel Decorative',serif;font-size:0.95rem;font-weight:700;color:var(--gold);text-decoration:none;display:flex;align-items:center;gap:10px;}
        .nav-logo-heb{font-family:'Noto Sans Hebrew',serif;font-size:1.1rem;color:var(--gold-dark);font-weight:300;}
        .nav-links{display:flex;list-style:none;}
        .nav-links li a{font-family:'Cinzel',serif;font-size:0.7rem;color:rgba(245,237,214,0.6);text-decoration:none;padding:0 18px;height:64px;display:flex;align-items:center;letter-spacing:2px;transition:color 0.3s;}
        .nav-links li a:hover{color:var(--gold-light);}
        .burger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:5px;}
        .burger span{display:block;width:24px;height:2px;background:var(--gold);}
        .hero{min-height:72vh;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:80px 20px 60px;}
        .hero-hebrew{font-family:'Noto Sans Hebrew',serif;font-size:clamp(2rem,5.5vw,4rem);color:var(--gold);margin-bottom:8px;letter-spacing:6px;}
        .hero h1{font-family:'Cinzel Decorative',serif;font-size:clamp(1.6rem,4.5vw,3.2rem);font-weight:700;line-height:1.15;margin-bottom:18px;letter-spacing:3px;}
        .hero h1 .accent{color:var(--gold);}
        .hero-subtitle{font-size:clamp(1rem,2vw,1.3rem);color:rgba(245,237,214,0.65);font-style:italic;max-width:620px;line-height:1.7;margin-bottom:30px;}
        #articles{padding:60px 20px 80px;}
        .scroll-container{background:var(--parchment);color:var(--ink);margin:0 auto;max-width:920px;box-shadow:0 40px 80px rgba(0,0,0,0.85);}
        .scroll-roller{height:22px;background:linear-gradient(90deg,#3a2510,#8a5c2a,#c48c40,#e8b860,#c48c40,#8a5c2a,#3a2510);}
        .scroll-body{padding:40px 50px 50px;border-left:16px solid #c09050;border-right:16px solid #c09050;background:#fdf5e6;}
        .celtic-frame{border:3px double rgba(138,107,42,0.6);padding:35px 30px;position:relative;min-height:200px;}
        .article-row{padding:22px 0;border-bottom:1px dashed rgba(138,107,42,0.35);transition:transform 0.3s;}
        .article-row:hover{transform:translateX(6px);}
        .flower-icon{color:var(--petrykivka);font-size:1.3rem;margin-right:10px;}
        .article-title{font-family:'Cinzel',serif;font-size:1.2rem;color:var(--ink);display:inline;}
        .article-preview{color:#3a2a14;margin:10px 0 0 30px;font-size:1.1rem;line-height:1.7;}
        .reveal{opacity:0;transform:translateY(28px);transition:all 0.8s ease-out;}
        .reveal.visible{opacity:1;transform:translateY(0);}
        .mobile-menu{display:none;position:fixed;top:105px;left:0;right:0;background:rgba(13,10,5,0.98);z-index:499;padding:20px 0;}
        .mobile-menu.open{display:block;}
        .mobile-menu a{display:block;font-family:'Cinzel',serif;padding:14px 40px;color:var(--parchment);text-decoration:none;border-bottom:1px solid rgba(201,168,76,0.1);}
    </style>
</head>
<body>

<div class="lang-bar">
    <span class="lang-bar-label">🌐 Мова / Language</span>
    <div class="lang-select-wrapper">
        <select id="language-select" onchange="translateTo(this.value)">
            <option value="">🇺🇦 Українська</option>
            <option value="en">🇬🇧 English</option>
            <option value="iw">🇮🇱 עברית</option>
            <option value="pl">🇵🇱 Polski</option>
        </select>
    </div>
</div>

<nav class="main-nav">
    <a href="#" class="nav-logo"><span class="nav-logo-heb">שְׁבָטִים</span>Found Tribes</a>
    <ul class="nav-links">
        <li><a href="#articles">Реєстр</a></li>
        <li><a href="#contact">Контакти</a></li>
    </ul>
    <div class="burger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
    <a href="#articles" onclick="closeMobile()">Реєстр</a>
    <a href="#contact" onclick="closeMobile()">Контакти</a>
</div>

<section class="hero">
    <div class="hero-hebrew">אֶת־הַשְּׁבָטִים</div>
    <h1>Found Tribes<br><span class="accent">of Israel</span></h1>
    <p class="hero-subtitle">Авторський реєстр мовних відповідностей — 500+ задокументованих відповідностей.</p>
</section>

<section id="articles">
    <div class="scroll-container reveal">
        <div class="scroll-roller"></div>
        <div class="scroll-body">
            <div class="celtic-frame">
                <div id="articlesList">
                    <div style="text-align:center; padding:40px;">Розгортання манускриптів...</div>
                </div>
            </div>
        </div>
        <div class="scroll-roller"></div>
    </div>
</section>

<section id="contact" style="padding:60px 20px; text-align:center;">
    <h2 style="font-family:'Cinzel Decorative'; color:var(--gold);">Зв'язок</h2>
    <p style="margin-top:20px; color:rgba(245,237,214,0.6);">Контактна інформація автора: arkadiyboychuk@gmail.com</p>
</section>

<script>
const SUPABASE_URL='https://jztxnznkjevzngvrlp.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6dHhuem5ramV2em5ndnJscHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNTQ0NTgsImV4cCI6MjA4NzYzMDQ1OH0.X9gS4qAfLJ8CO2mF0OXaGgierBtxdszUJZn_r7224oE';
async function loadArticles() {
        const list = document.getElementById('articlesList');
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/articles?select=*`, {
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': 'Bearer ' + SUPABASE_KEY
                }
            });

            if (!response.ok) throw new Error('Помилка сервера');
            const data = await response.json();

            if (!data || data.length === 0) {
                list.innerHTML = "<div style='text-align:center; padding:40px;'>Архів порожній.</div>";
                return;
            }
            list.innerHTML = data.map(a => `
    <div class="article-row reveal">
        <div class="article-title-row">
            <span class="flower-icon">✿</span>
            <h3 class="article-title">${a.Title}</h3>
        </div>
        <p class="article-preview">${(a.Articles || '').substring(0, 160)}...</p>
                </div>
            `).join('');

            initReveal();
        } catch (err) {
            console.error(err);
            list.innerHTML = "<div style='text-align:center; padding:40px; color:red;'>Помилка підключення до бази.</div>";
        }
    }

    function initReveal() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    }

    function toggleMenu() { document.getElementById('mobileMenu').classList.toggle('open'); }
    function closeMobile() { document.getElementById('mobileMenu').classList.remove('open'); }

    window.onload = loadArticles;
</script>
</body>
</html>
