<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Found Tribes of Israel | Лінгвістичне Дослідження</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond&family=Noto+Sans+Hebrew&display=swap" rel="stylesheet">

<style>
:root{
    --gold:#c9a84c;
    --gold-light:#e8c97a;
    --gold-dark:#8a6b2a;
    --parchment:#fdf5e6;
    --deep:#17120b;
}

body{
    margin:0;
    background:var(--deep);
    color:var(--parchment);
    font-family:'EB Garamond',serif;
}

nav{
    background:linear-gradient(90deg,#fdf5e6,#f6e6c0);
    color:#000;
    padding:16px 40px;
    display:flex;
    justify-content:space-between;
}

.nav-links a{
    margin:0 10px;
    color:#000;
}

.hero{
    text-align:center;
    padding:80px 20px;
}

.article-row{
    border:1px solid rgba(201,168,76,0.3);
    padding:16px;
    margin:16px;
    cursor:pointer;
}

.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:#111;
    padding:20px;
    max-width:700px;
}
</style>
</head>

<body>

<nav>
    <div>Found Tribes</div>
    <div class="nav-links">
        <a href="#">Головна</a>
        <a href="#">Статті</a>
    </div>
</nav>

<section class="hero">
    <h1>Found Tribes of Israel</h1>
</section>

<section id="articles">
    <div id="articlesList">Завантаження...</div>
</section>

<div class="modal" id="articleModal">
    <div class="modal-content">
        <span onclick="closeArticle()" style="cursor:pointer;color:gold;">✕</span>
        <h2 id="modalTitle"></h2>
        <div id="modalContent"></div>
    </div>
</div>

<script>

// 🔑 SUPABASE
const SUPABASE_URL = 'https://jztxnznkjevzngvrlpzh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6dHhuem5ramV2em5ndnJscHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNTQ0NTgsImV4cCI6MjA4NzYzMDQ1OH0.X9gS4qAfLJ8CO2mF0OXaGgierBtxdszUJZn_r7224oE';

// 📚 LOAD ARTICLES
async function loadArticles(){
    const list = document.getElementById('articlesList');

    try{
        const res = await fetch(SUPABASE_URL + '/rest/v1/articles?select=*', {
            headers:{
                apikey: SUPABASE_KEY,
                Authorization: 'Bearer ' + SUPABASE_KEY
            }
        });

        const data = await res.json();

        list.innerHTML = data.map(a => `
            <div class="article-row" onclick="openArticle('${encodeURIComponent(a.title)}','${encodeURIComponent(a.content)}')">
                <h3>${a.title}</h3>
                <p>${(a.content || '').substring(0,120)}...</p>
            </div>
        `).join('');

    }catch(e){
        list.innerHTML = 'Помилка';
    }
}

// 📖 MODAL
function openArticle(title,content){
    document.getElementById('modalTitle').innerText = decodeURIComponent(title);
    document.getElementById('modalContent').innerHTML = decodeURIComponent(content);
    document.getElementById('articleModal').style.display='flex';
}

function closeArticle(){
    document.getElementById('articleModal').style.display='none';
}

// ESC
document.addEventListener('keydown',e=>{
    if(e.key==='Escape') closeArticle();
});

// 🚀 START
loadArticles();

</script>

</body>
</html>
